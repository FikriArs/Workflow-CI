name: Advanced ML Workflow

on:
  push:
    paths:
      - 'MLProject/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.12.7
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: '3.12.7'

    - name: Check Env
      run: python --version && conda --version

    - name: Install dependencies
      run: pip install mlflow==2.19.0 pandas scikit-learn

    - name: Run mlflow project
      run: |
        cd MLProject
        export MLFLOW_TRACKING_URI=http://127.0.0.1:5000
        mlflow server --host 127.0.0.1 --port 5000 &
        sleep 5
        mlflow run .

    - name: Get latest MLflow run_id
      id: get_run_id
      run: |
        cd MLProject
        RUN_ID=$(ls mlruns/0 | grep -E '^[a-z0-9]+$' | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Found Run ID: $RUN_ID"

    - name: Install Python dependencies
      run: echo "Dependencies installed in previous steps."

    - name: Upload to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-artifacts
        path: MLProject/mlruns/

    - name: Build Docker Model
      run: |
        cd MLProject
        cat << 'EOF' > Dockerfile
        FROM python:3.12-slim
        RUN pip install mlflow==2.19.0 pandas scikit-learn
        COPY mlruns /app/mlruns
        ENV MLFLOW_TRACKING_URI=file:///app/mlruns
        EXPOSE 8080
        CMD RUN_ID=$$(ls /app/mlruns/0 | grep -E '^[a-z0-9]+$$' | head -n 1) && mlflow models serve -m "runs:/$$RUN_ID/model" -h 0.0.0.0 -p 8080 --no-conda
        EOF
        docker build -t league-predictor-model:latest .

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Docker Image
      run: docker tag league-predictor-model:latest ${{ secrets.DOCKER_USERNAME }}/league-predictor-model:latest

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/league-predictor-model:latest
